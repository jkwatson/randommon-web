<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fully Automated Luxury Dungeon</title>
  <link rel="stylesheet" href="/src/styles/base.css" />
  <link rel="stylesheet" href="/src/styles/layout.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="./src/dungeon.css" />
</head>
<body>
  <header class="app-header">
    <h1>FULLY AUTOMATED LUXURY DUNGEON</h1>
    <div class="header-actions">
      <button class="btn-theme" id="btn-theme" title="Toggle light/dark mode">☀</button>
    </div>
  </header>

  <nav class="module-tabs" role="tablist" aria-label="Module">
    <button class="module-tab active" data-module="dolmenwood" role="tab" aria-selected="true">Dolmenwood</button>
    <button class="module-tab" data-module="dungeon" role="tab" aria-selected="false">Dungeon</button>
    <button class="module-tab" data-module="wilderness" role="tab" aria-selected="false">Wilderness</button>
  </nav>

  <div class="dungeon-body">

    <!-- ── Dolmenwood module ──────────────────────────────────────── -->
    <div class="module-panel" id="module-dolmenwood">

      <section class="encounter-controls panel">
        <h2 class="panel-title">Encounter</h2>

        <div class="control-row">
          <label for="sel-region">Region</label>
          <select id="sel-region">
            <option value="aldweald">Aldweald</option>
            <option value="aquatic">Aquatic</option>
            <option value="dwelmfurgh">Dwelmfurgh</option>
            <option value="feverMarsh">Fever Marsh</option>
            <option value="hagsAddle">Hag's Addle</option>
            <option value="highWold">High Wold</option>
            <option value="mulchgrove">Mulchgrove</option>
            <option value="nagwood">Nagwood</option>
            <option value="northernScratch">Northern Scratch</option>
            <option value="tableDowns">Table Downs</option>
            <option value="tithelands">Tithelands</option>
            <option value="valleyOfWiseBeasts">Valley of Wise Beasts</option>
          </select>
        </div>

        <div class="control-row">
          <label for="sel-time">Time</label>
          <select id="sel-time">
            <option value="day">Daytime</option>
            <option value="night">Nighttime</option>
          </select>
        </div>

        <div class="control-row" id="terrain-row">
          <label for="sel-terrain">Terrain</label>
          <select id="sel-terrain">
            <option value="road">Road / Track</option>
            <option value="wild">Wild</option>
          </select>
        </div>

        <div class="control-row" id="fire-row" hidden>
          <label for="sel-fire">Fire?</label>
          <select id="sel-fire">
            <option value="yes">Yes — fire present</option>
            <option value="no">No fire</option>
          </select>
        </div>

        <button class="btn-primary" id="btn-encounter">Roll Encounter</button>
      </section>

    </div>

    <!-- ── Dungeon module ─────────────────────────────────────────── -->
    <div class="module-panel" id="module-dungeon" hidden>
      <div class="dungeon-layout">

        <div class="dungeon-sidebar">
          <section class="panel">
            <h2 class="panel-title">Dungeon</h2>
            <div class="control-row">
              <label for="sel-setting">Setting</label>
              <select id="sel-setting">
                <option value="generic">Generic</option>
                <option value="dolmenwood">Dolmenwood</option>
              </select>
            </div>
            <button class="btn-primary" id="btn-dungeon">New Dungeon</button>
            <div id="dungeon-status" class="dungeon-status"></div>
            <div class="control-row">
              <label for="sel-party-level">Party Level</label>
              <select id="sel-party-level">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </div>
            <div class="dungeon-controls">
              <button class="btn-primary" id="btn-enter-dungeon" disabled>Enter Dungeon</button>
              <button class="btn-secondary" id="btn-crawl-back" hidden>&#8592; Back</button>
            </div>
          </section>
          <div id="dungeon-map" class="dungeon-map" hidden></div>
        </div>

        <div class="dungeon-main">
          <div id="output-stocked-room" hidden></div>
        </div>

        <div class="dungeon-reference">
          <div id="enc-check-panel" class="panel" hidden>
            <h2 class="panel-title">Encounter Check</h2>
            <button class="btn-secondary" id="btn-check-encounter">Check for Encounter</button>
            <div id="enc-check-result" hidden></div>
          </div>
          <div id="output-dungeon" class="output-card" hidden></div>
        </div>

      </div>
    </div>

    <!-- ── Wilderness module ──────────────────────────────────────── -->
    <div class="module-panel module-placeholder" id="module-wilderness" hidden>
      <p>Wilderness hex-crawl — coming soon.</p>
    </div>

    <!-- ── Shared output ─────────────────────────────────────────── -->
    <section class="dungeon-output">
      <div id="output-encounter" class="output-card" hidden></div>
    </section>

  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
