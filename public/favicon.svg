<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Horns -->
  <rect x="4" y="1" width="2" height="2" fill="#c8872a"/>
  <rect x="10" y="1" width="2" height="2" fill="#c8872a"/>
  <!-- Outline -->
  <rect x="3" y="3" width="10" height="1" fill="#1a4d08"/>
  <rect x="3" y="12" width="10" height="1" fill="#1a4d08"/>
  <rect x="3" y="4" width="1" height="8" fill="#1a4d08"/>
  <rect x="12" y="4" width="1" height="8" fill="#1a4d08"/>
  <!-- Body -->
  <rect x="4" y="4" width="8" height="8" fill="#3da81e"/>
  <!-- Eyes -->
  <rect x="5" y="5" width="2" height="2" fill="#f5e535"/>
  <rect x="9" y="5" width="2" height="2" fill="#f5e535"/>
  <!-- Pupils -->
